<title>JEE Journey Tracker</title>
<style>
  :root{
    --bg:#0f1117; --panel:#171a23; --panel2:#1d2130; --border:#2a2f3f;
    --text:#e8eaf0; --muted:#8a90a3; --accent:#5b8cff; --accent2:#7c5cff;
    --good:#34c77b; --warn:#f2b84b; --bad:#f0556b; --radius:14px;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:linear-gradient(160deg,#0c0e14,#14161f 60%,#10131c);color:var(--text);min-height:100vh;}
  .app{display:flex;min-height:100vh;}
  .sidebar{width:230px;background:var(--panel);border-right:1px solid var(--border);padding:20px 14px;position:sticky;top:0;height:100vh;flex-shrink:0;overflow-y:auto;}
  .brand{font-weight:700;font-size:18px;margin-bottom:4px;background:linear-gradient(90deg,var(--accent),var(--accent2));-webkit-background-clip:text;background-clip:text;color:transparent;}
  .brand-sub{font-size:11px;color:var(--muted);margin-bottom:24px;}
  .nav-btn{display:flex;align-items:center;gap:10px;width:100%;padding:11px 12px;background:transparent;border:none;color:var(--muted);border-radius:10px;cursor:pointer;font-size:13.5px;text-align:left;margin-bottom:4px;transition:.15s;}
  .nav-btn:hover{background:var(--panel2);color:var(--text);}
  .nav-btn.active{background:linear-gradient(90deg,rgba(91,140,255,.18),rgba(124,92,255,.12));color:#fff;border:1px solid var(--border);}
  .main{flex:1;padding:26px 32px;max-width:1200px;width:100%;}
  h1{font-size:22px;margin:0 0 4px;}
  .pagesub{color:var(--muted);font-size:13px;margin-bottom:22px;}
  .grid{display:grid;gap:16px;}
  .grid-4{grid-template-columns:repeat(4,1fr);}
  .grid-3{grid-template-columns:repeat(3,1fr);}
  .grid-2{grid-template-columns:repeat(2,1fr);}

  /* ===== Mobile layout ===== */
  @media(max-width:900px){
    body{padding-bottom:env(safe-area-inset-bottom);}
    .app{flex-direction:column;}
    .sidebar{
      width:100%;height:auto;position:sticky;top:0;z-index:30;
      display:flex;overflow-x:auto;gap:4px;padding:10px 10px;
      align-items:center;-webkit-overflow-scrolling:touch;
      border-right:none;border-bottom:1px solid var(--border);
    }
    .brand{display:none;}
    .brand-sub{display:none;}
    .nav-btn{
      flex-direction:column;gap:3px;white-space:nowrap;
      padding:8px 12px;font-size:11px;border-radius:10px;flex-shrink:0;
      min-width:64px;text-align:center;
    }
    .main{padding:16px 14px 90px;}
    h1{font-size:19px;}
    .grid-4,.grid-3,.grid-2{grid-template-columns:1fr;}
    .card{padding:14px;}
    .countdown-units{gap:8px;}
    .cd-unit{min-width:62px;padding:8px 10px;}
    .cd-num{font-size:22px;}
    .modal{width:94vw;padding:18px;}
    .timer-setup{flex-direction:column;align-items:stretch;}
    .timer-setup .field{width:100% !important;}
    table{font-size:11.5px;}
    th,td{padding:7px 5px;}
    .timer-big{font-size:18vw;}
    .err-stat{min-width:100px;padding:8px 10px;}
  }
  @media(max-width:420px){
    .nav-btn{min-width:56px;font-size:10px;padding:7px 8px;}
    h1{font-size:17px;}
  }
  .card{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:18px;}
  .stat-num{font-size:26px;font-weight:700;}
  .stat-label{color:var(--muted);font-size:12.5px;margin-top:2px;}
  .section-title{font-size:15px;font-weight:600;margin:26px 0 12px;display:flex;align-items:center;justify-content:space-between;}
  input,textarea,select{background:var(--panel2);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:9px 11px;font-size:13.5px;font-family:inherit;width:100%;}
  textarea{resize:vertical;min-height:70px;}
  button.btn{background:linear-gradient(90deg,var(--accent),var(--accent2));border:none;color:#fff;padding:9px 16px;border-radius:8px;cursor:pointer;font-size:13.5px;font-weight:600;}
  button.btn:hover{filter:brightness(1.1);}
  button.btn-ghost{background:var(--panel2);border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:8px;cursor:pointer;font-size:12.5px;}
  button.icon-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:15px;padding:4px 6px;}
  button.icon-btn:hover{color:var(--bad);}
  .row{display:flex;gap:10px;flex-wrap:wrap;}
  .list-item{background:var(--panel2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:flex-start;gap:10px;}
  .list-item .body{flex:1;}
  .tag{display:inline-block;font-size:10.5px;padding:2px 8px;border-radius:20px;background:rgba(91,140,255,.15);color:#9db8ff;margin-right:6px;}
  .tag.chem{background:rgba(52,199,123,.15);color:#6ee7a8;}
  .tag.math{background:rgba(242,184,75,.15);color:#f6cd7c;}
  .tag.phy{background:rgba(91,140,255,.15);color:#9db8ff;}
  .chk{width:20px;height:20px;flex-shrink:0;accent-color:var(--accent);margin-top:2px;cursor:pointer;}
  .done-text{text-decoration:line-through;color:var(--muted);}
  .progress-bar{background:var(--panel2);border-radius:20px;height:8px;overflow:hidden;margin-top:6px;}
  .progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--good));}
  .topic-block{margin-bottom:18px;}
  .topic-block h4{margin:0 0 8px;font-size:13.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;}
  .topic-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:8px;}
  .topic-pill{display:flex;align-items:center;gap:8px;background:var(--panel2);border:1px solid var(--border);border-radius:8px;padding:8px 10px;font-size:12.5px;}
  table{width:100%;border-collapse:collapse;font-size:13px;}
  th,td{padding:9px 8px;border-bottom:1px solid var(--border);text-align:left;}
  th{color:var(--muted);font-weight:600;font-size:11.5px;text-transform:uppercase;}
  .empty{color:var(--muted);font-size:13px;text-align:center;padding:30px 0;}
  .pill-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
  .timetable-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:10px;}
  .timetable-grid{display:grid;grid-template-columns:80px repeat(7,minmax(110px,1fr));gap:1px;background:var(--border);border-radius:10px;overflow:hidden;font-size:11.5px;min-width:860px;}
  .tt-cell{background:var(--panel2);padding:6px;min-height:38px;}
  .tt-cell:nth-child(8n+1){position:sticky;left:0;z-index:5;background:#22273a;}
  .tt-head{background:#22273a;text-align:center;font-weight:600;padding:8px 4px;}
  .tt-cell textarea{min-height:34px;font-size:11px;padding:4px 6px;border:none;background:transparent;width:100%;}
  .modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);align-items:center;justify-content:center;z-index:50;}
  .modal-bg.open{display:flex;}
  .modal{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:22px;width:420px;max-width:90vw;}
  .field{margin-bottom:12px;}
  .field label{font-size:12px;color:var(--muted);display:block;margin-bottom:5px;}
  .close-x{float:right;background:none;border:none;color:var(--muted);cursor:pointer;font-size:18px;}
  ::-webkit-scrollbar{width:8px;height:8px;}
  ::-webkit-scrollbar-thumb{background:#2a2f3f;border-radius:10px;}

  /* Exam countdown */
  .countdown-card{background:linear-gradient(120deg,rgba(91,140,255,.14),rgba(124,92,255,.10));border:1px solid var(--border);border-radius:var(--radius);padding:20px 22px;margin-bottom:20px;}
  .countdown-title{font-size:13px;color:var(--muted);margin-bottom:10px;letter-spacing:.3px;}
  .countdown-units{display:flex;gap:14px;flex-wrap:wrap;}
  .cd-unit{background:var(--panel2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;min-width:78px;text-align:center;}
  .cd-num{font-size:28px;font-weight:800;font-variant-numeric:tabular-nums;background:linear-gradient(90deg,var(--accent),var(--accent2));-webkit-background-clip:text;background-clip:text;color:transparent;}
  .cd-label{font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:2px;}

  /* Focus timer */
  .timer-setup{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;}
  .timer-setup .field{margin-bottom:0;}
  #timerOverlay{display:none;position:fixed;inset:0;background:radial-gradient(circle at 50% 40%,#171b29,#06070b 80%);z-index:100;flex-direction:column;align-items:center;justify-content:center;color:#fff;text-align:center;}
  #timerOverlay.open{display:flex;}
  .timer-goal{font-size:20px;color:var(--muted);margin-bottom:14px;letter-spacing:.3px;}
  .timer-big{font-size:min(20vw,160px);font-weight:800;font-variant-numeric:tabular-nums;letter-spacing:2px;background:linear-gradient(90deg,var(--accent),var(--accent2));-webkit-background-clip:text;background-clip:text;color:transparent;line-height:1;}
  .timer-big.urgent{background:linear-gradient(90deg,var(--bad),#ff8a5b);-webkit-background-clip:text;background-clip:text;}
  .timer-controls{margin-top:30px;display:flex;gap:14px;}
  .timer-controls button{font-size:14px;padding:11px 22px;border-radius:10px;}
  .sprint-row{display:flex;align-items:center;gap:10px;}
  .topic-pill{flex-direction:column;align-items:flex-start;gap:4px;}
  .topic-pill .tp-top{display:flex;align-items:center;gap:8px;width:100%;}
  .tp-revise-row{display:flex;align-items:center;justify-content:space-between;width:100%;gap:6px;}
  .revise-badge{font-size:10px;color:var(--muted);}
  .revise-badge.overdue{color:var(--bad);font-weight:600;}
  .revise-btn{background:none;border:1px solid var(--border);color:var(--accent);font-size:10px;padding:2px 8px;border-radius:20px;cursor:pointer;}
  .revise-btn:hover{background:rgba(91,140,255,.12);}
  .overdue-card{background:rgba(240,85,107,.08);border:1px solid rgba(240,85,107,.3);}
  .err-stat{background:var(--panel2);border:1px solid var(--border);border-radius:10px;padding:10px 14px;text-align:center;min-width:120px;}
  @media(max-width:500px){
    .timer-goal{font-size:15px;padding:0 14px;}
    .timer-controls{flex-direction:column;width:80%;}
    .timer-controls button{width:100%;}
    .topic-grid{grid-template-columns:1fr;}
    .countdown-card{padding:14px 16px;}
  }
</style>
</head>
<body>
<div class="app">
  <div class="sidebar">
    <div class="brand">🚀 JEE Tracker</div>
    <div class="brand-sub">Your full prep companion</div>
    <button class="nav-btn active" data-page="dashboard">📊 Dashboard</button>
    <button class="nav-btn" data-page="goals">✅ Daily Goals</button>
    <button class="nav-btn" data-page="topics">📚 Topics & Concepts</button>
    <button class="nav-btn" data-page="notes">📝 Short Notes</button>
    <button class="nav-btn" data-page="problems">🧮 Problem Log</button>
    <button class="nav-btn" data-page="errorlog">❌ Error Log</button>
    <button class="nav-btn" data-page="tests">🏆 Test Tracker</button>
    <button class="nav-btn" data-page="lectureplan">🎥 Lecture Planner</button>
    <button class="nav-btn" data-page="testplan">🗓️ Test Planner</button>
    <button class="nav-btn" data-page="timetable">⏰ Timetable</button>
    <button class="nav-btn" data-page="focustimer">⏱️ Focus Timer</button>
  </div>
  <div class="main" id="main"></div>
</div>

<div class="modal-bg" id="modalBg"><div class="modal" id="modal"></div></div>

<div id="timerOverlay">
  <div class="timer-goal" id="timerGoalLabel"></div>
  <div class="timer-big" id="timerBig">00:00</div>
  <div class="timer-controls">
    <button class="btn-ghost" id="timerPauseBtn" onclick="pauseResumeTimer()">⏸ Pause</button>
    <button class="btn-ghost" onclick="cancelTimer()">✕ Cancel</button>
  </div>
</div>

<script>
const SUBJECTS = ["Physics","Chemistry","Maths"];
const SUBJECT_CLASS = {Physics:"phy", Chemistry:"chem", Maths:"math"};

const SYLLABUS = {
  Physics: ["Units & Measurements","Kinematics","Laws of Motion","Work Energy Power","Rotational Motion","Gravitation","Properties of Solids & Fluids","Thermodynamics","Kinetic Theory of Gases","Oscillations & Waves","Electrostatics","Current Electricity","Magnetic Effects of Current","Electromagnetic Induction","Alternating Current","EM Waves","Optics","Modern Physics","Semiconductors"],
  Chemistry: ["Mole Concept","Atomic Structure","Periodicity","Chemical Bonding","States of Matter","Thermodynamics","Equilibrium","Redox Reactions","Hydrogen","S-Block Elements","P-Block Elements","D & F Block Elements","Coordination Compounds","General Organic Chemistry","Hydrocarbons","Haloalkanes & Haloarenes","Alcohols Phenols Ethers","Aldehydes Ketones","Carboxylic Acids","Amines","Biomolecules","Polymers","Electrochemistry","Chemical Kinetics","Surface Chemistry"],
  Maths: ["Sets Relations Functions","Complex Numbers","Quadratic Equations","Sequences & Series","Permutations & Combinations","Binomial Theorem","Matrices & Determinants","Limits Continuity Differentiability","Application of Derivatives","Indefinite Integration","Definite Integration","Differential Equations","Coordinate Geometry - Lines","Circles","Conic Sections","Vectors","3D Geometry","Trigonometry","Inverse Trig Functions","Statistics","Probability"]
};

let DATA = {
  goals: [], topicsDone: {}, notes: [], problems: [], tests: [],
  lectureplan: [], testplan: [], timetable: {}, sprints: [],
  topicsRevised: {}, errors: []
};

const EXAM_DEADLINE = new Date('2027-01-01T00:00:00');
const REVISION_OVERDUE_DAYS = 15;
const ERROR_TYPES = ["Silly/Calculation Mistake","Concept Gap","Formula Forgotten","Time Pressure","Misread Question","Other"];

const DAYS = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
const SLOTS = ["6-8am","8-10am","10-12pm","12-2pm","2-4pm","4-6pm","6-8pm","8-10pm"];

async function loadAll(){
  for(const key of Object.keys(DATA)){
    try{
      const val = await storageGet('jee:'+key);
      if(val !== null && val !== undefined){
        const parsed = JSON.parse(val);
        DATA[key] = parsed;
      }
    }catch(e){ console.warn('load failed for', key, e); }
  }
  render();
  // Show a one-time banner if persistence is running on the local fallback
  if(window._usingFallback){
    const note = document.createElement('div');
    note.style.cssText = 'position:fixed;bottom:14px;right:14px;background:#1d2130;border:1px solid #2a2f3f;color:#f6cd7c;padding:10px 14px;border-radius:10px;font-size:12px;z-index:200;max-width:280px;';
    note.innerHTML = '💾 Saving to this browser only. Keep using the same browser/device, and avoid Incognito/Private mode, or your data won\'t persist.';
    document.body.appendChild(note);
    setTimeout(()=>note.remove(), 9000);
  }
}

async function storageGet(key){
  // Try Claude's persistent artifact storage first
  if(window.storage && typeof window.storage.get === 'function'){
    try{
      const r = await window.storage.get(key, false);
      if(r && r.value !== undefined) return r.value;
      return null;
    }catch(e){
      // key not found is expected; only fall back on hard failures
    }
  }
  // Fallback: plain localStorage (works when file is opened directly in a browser)
  window._usingFallback = true;
  try{
    const v = localStorage.getItem(key);
    return v;
  }catch(e){
    return null;
  }
}

async function storageSet(key, value){
  let usedPrimary = false;
  if(window.storage && typeof window.storage.set === 'function'){
    try{
      const result = await window.storage.set(key, value, false);
      if(result) usedPrimary = true;
    }catch(e){ /* fall through to localStorage */ }
  }
  if(!usedPrimary){
    window._usingFallback = true;
    try{ localStorage.setItem(key, value); }
    catch(e){ console.error('All storage methods failed for', key, e); }
  }
}

async function save(key){
  await storageSet('jee:'+key, JSON.stringify(DATA[key]));
}

function daysSince(dateStr){
  if(!dateStr) return null;
  const diff = Date.now() - new Date(dateStr).getTime();
  return Math.floor(diff / (1000*60*60*24));
}
function renderTopics(main){
  main.innerHTML = `

    <div class="pagesub">Track coverage, and revise completed topics before you forget them</div>
    <div id="topicsContainer"></div>
  `;

  container.innerHTML = SUBJECTS.map(s=>{
    const chs = SYLLABUS[s];
    return `<div class="topic-block">
      <h4>${s}</h4>
      <div class="topic-grid">
        ${chs.map(c=>{
          const key = s+'::'+c; const done = !!DATA.topicsDone[key];
          const revDate = DATA.topicsRevised[key];
          const d = daysSince(revDate);
          let badgeHtml = '';
          if(done){
            if(d===null) badgeHtml = `<span class="revise-badge overdue">Never revised</span>`;
            else if(d>=REVISION_OVERDUE_DAYS) badgeHtml = `<span class="revise-badge overdue">${d}d ago — overdue</span>`;
            else badgeHtml = `<span class="revise-badge">${d===0?'Revised today':d+'d ago'}</span>`;
          }
          return `<div class="topic-pill">
            <div class="tp-top">
              <input type="checkbox" class="chk" style="width:16px;height:16px;" ${done?'checked':''} onchange="toggleTopic('${key.replace(/'/g,"\\'")}')">
              <span class="${done?'done-text':''}">${c}</span>
            </div>
            ${done?`<div class="tp-revise-row">${badgeHtml}<button class="revise-btn" onclick="markRevised('${key.replace(/'/g,"\\'")}')">Mark Revised</button></div>`:''}
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }).join('');
}
function toggleTopic(key){
  DATA.topicsDone[key] = !DATA.topicsDone[key];
  if(DATA.topicsDone[key] && !DATA.topicsRevised[key]){
    DATA.topicsRevised[key] = new Date().toISOString().slice(0,10);
    save('topicsRevised');
  }
  save('topicsDone'); render();
}
function markRevised(key){
  DATA.topicsRevised[key] = new Date().toISOString().slice(0,10);
  save('topicsRevised'); render();
}
function getOverdueTopics(){
  const out = [];
  SUBJECTS.forEach(s=>{
    SYLLABUS[s].forEach(c=>{
      const key = s+'::'+c;
      if(DATA.topicsDone[key]){
        const d = daysSince(DATA.topicsRevised[key]);
        if(d===null || d>=REVISION_OVERDUE_DAYS) out.push({subject:s, topic:c, days:d});
      }
    });
  });
  return out.sort((a,b)=>(b.days??999)-(a.days??999));
}

  list.innerHTML = [...DATA.lectureplan].sort((a,b)=>new Date(a.date)-new Date(b.date)).map(l=>`
    <div class="list-item">
      <input type="checkbox" class="chk" ${l.done?'checked':''} onchange="toggleLecture('${l.id}')">
      <div class="body ${l.done?'done-text':''}">
        <span class="tag ${SUBJECT_CLASS[l.subject]||''}">${l.subject}</span>
        <b>${l.title}</b> <span style="color:var(--muted);font-size:12px;">— ${l.date}</span>
      </div>
      <button class="icon-btn" onclick="deleteLecture('${l.id}')">🗑</button>
    </div>`).join('');
}
function openLectureForm(){
  openModal(`
    <h3 style="margin-top:0;">Add Lecture</h3>
    <div class="field"><label>Subject</label><select id="lSubject">${SUBJECTS.map(s=>`<option>${s}</option>`).join('')}</select></div>
    <div class="field"><label>Title / Topic</label><input id="lTitle" placeholder="e.g. Rotational Motion Pt.2"></div>
    <div class="field"><label>Planned Date</label><input id="lDate" type="date" value="${new Date().toISOString().slice(0,10)}"></div>
    <button class="btn" onclick="saveLecture()">Save</button>
  `);
}
function saveLecture(){
  const subject = document.getElementById('lSubject').value;
  const title = document.getElementById('lTitle').value.trim();
  const date = document.getElementById('lDate').value;
  if(!title) return;
  DATA.lectureplan.push({id:uid(), subject, title, date, done:false});
  save('lectureplan'); closeModal(); render();
}
function toggleLecture(id){ const l = DATA.lectureplan.find(x=>x.id===id); l.done=!l.done; save('lectureplan'); render(); }
function deleteLecture(id){ DATA.lectureplan = DATA.lectureplan.filter(x=>x.id!==id); save('lectureplan'); render(); }

/* ---------- TIMETABLE ---------- */
function renderTimetable(main){
  main.innerHTML = `
    <h1>Weekly Timetable</h1>
    <div class="pagesub">Your recurring study schedule — click a cell to edit (scroll sideways on mobile)</div>
    <div class="timetable-wrap"><div class="timetable-grid" id="ttGrid"></div></div>
  `;

function saveTimetableCell(key, val){

  save('timetable');
}

/* ---------- FOCUS TIMER (rapid goal sprints) ---------- */
let timerState = { remaining:0, total:0, goal:'', running:false, intervalId:null };

function renderFocusTimer(main){
  main.innerHTML = `
    <h1>Focus Timer</h1>
    <div class="pagesub">Set a rapid goal, give it a time limit, and beat the clock</div>
    <div class="card">
      <div class="timer-setup">
        <div class="field" style="flex:2;min-width:220px;"><label>Goal</label><input id="sprintGoal" placeholder="e.g. Solve 15 mole concept numericals"></div>
        <div class="field" style="width:90px;"><label>Minutes</label><input id="sprintMin" type="number" min="0" value="15"></div>
        <div class="field" style="width:90px;"><label>Seconds</label><input id="sprintSec" type="number" min="0" max="59" value="0"></div>
        <button class="btn" onclick="startSprintTimer()">▶ Start</button>
      </div>
      <div class="row" style="margin-top:12px;">
        ${[5,10,15,20,30,45,60].map(m=>`<button class="btn-ghost" onclick="quickSet(${m})">${m} min</button>`).join('')}
      </div>
    </div>

    <div class="section-title">Sprint History (${DATA.sprints.length})</div>
    <table>
      <tr><th>Date</th><th>Goal</th><th>Duration</th><th>Result</th></tr>
      ${[...DATA.sprints].reverse().map(s=>`
        <tr>
          <td>${s.date}</td>
          <td>${s.goal}</td>
          <td>${s.duration}</td>
          <td>${s.result==='completed'?'✅ Completed':'⏱️ Time ran out'}</td>
        </tr>`).join('') || `<tr><td colspan="4" class="empty">No sprints logged yet. Start your first one above.</td></tr>`}
    </table>
  `;
}
function quickSet(mins){
  document.getElementById('sprintMin').value = mins;
  document.getElementById('sprintSec').value = 0;
}
function startSprintTimer(){
  const goal = document.getElementById('sprintGoal').value.trim() || 'Focus Sprint';
  const mins = parseInt(document.getElementById('sprintMin').value)||0;
  const secs = parseInt(document.getElementById('sprintSec').value)||0;
  const total = mins*60 + secs;
  if(total <= 0) return;
  timerState = { remaining: total, total, goal, running:true, intervalId:null };
  document.getElementById('timerGoalLabel').textContent = goal;
  document.getElementById('timerOverlay').classList.add('open');
  document.getElementById('timerPauseBtn').textContent = '⏸ Pause';
  renderTimerDisplay();
  timerState.intervalId = setInterval(tickTimer, 1000);
}
function renderTimerDisplay(){
  const m = Math.floor(timerState.remaining/60);
  const s = timerState.remaining%60;
  const big = document.getElementById('timerBig');
  big.textContent = `${pad(m)}:${pad(s)}`;
  big.classList.toggle('urgent', timerState.remaining <= 10);
}
function tickTimer(){
  if(!timerState.running) return;
  timerState.remaining--;
  renderTimerDisplay();
  if(timerState.remaining <= 0){
    clearInterval(timerState.intervalId);
    playBeep();
    logSprint('completed');
    document.getElementById('timerGoalLabel').textContent = `✅ Time's up — "${timerState.goal}"`;
    setTimeout(()=>{ closeTimerOverlay(); }, 2500);
  }
}
function pauseResumeTimer(){
  timerState.running = !timerState.running;
  document.getElementById('timerPauseBtn').textContent = timerState.running ? '⏸ Pause' : '▶ Resume';
}
function cancelTimer(){
  clearInterval(timerState.intervalId);
  if(timerState.total>0 && timerState.remaining>0 && timerState.remaining<timerState.total){
    logSprint('cancelled-' + timerState.remaining);
  }
  closeTimerOverlay();
}
function closeTimerOverlay(){
  document.getElementById('timerOverlay').classList.remove('open');
  if(currentPage==='focustimer') render();
}
function logSprint(result){
  const m = Math.floor(timerState.total/60), s = timerState.total%60;
  DATA.sprints.push({id:uid(), goal:timerState.goal, duration:`${m}m ${s}s`, result: result.startsWith('completed')?'completed':'timeout', date:new Date().toISOString().slice(0,10)});
  save('sprints');
}
function playBeep(){
  try{
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    [0,300,600].forEach(delay=>{
      setTimeout(()=>{
        const o = ctx.createOscillator(); const g = ctx.createGain();
        o.type='sine'; o.frequency.value=880;
        o.connect(g); g.connect(ctx.destination);
        g.gain.setValueAtTime(0.2, ctx.currentTime);
        o.start(); o.stop(ctx.currentTime+0.25);
      }, delay);
    });
  }catch(e){}
}

loadAll();
</script>
